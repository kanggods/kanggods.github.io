        <h3 id="toString-NaN"><a href="#toString-NaN" class="headerlink" title="toString"></a>toString</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">toString 是用来重写的。子类默认继承Object</span><br></pre></td></tr></table></figure>

<h3 id="Date"><a href="#Date" class="headerlink" title="Date"></a>Date</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br></pre></td><td class="code"><pre><span class="line">日期toString</span><br><span class="line">时间毫秒：getTime</span><br><span class="line">  用于代码执行性能分析。</span><br><span class="line">   SimpleDateFormat s &#x3D; new SimpleDateFormat(&quot;&quot;);</span><br><span class="line">Date and Time Pattern  Result  </span><br><span class="line">&quot;yyyy.MM.dd G &#39;at&#39; HH:mm:ss z&quot;  2001.07.04 AD at 12:08:56 PDT </span><br><span class="line">&quot;EEE, MMM d, &#39;&#39;yy&quot;  Wed, Jul 4, &#39;01  </span><br><span class="line">&quot;h:mm a&quot;  12:08 PM  </span><br><span class="line">&quot;hh &#39;o&#39;&#39;clock&#39; a, zzzz&quot;  12 o&#39;clock PM, Pacific Daylight Time </span><br><span class="line">&quot;K:mm a, z&quot;  0:08 PM, PDT  </span><br><span class="line">&quot;yyyyy.MMMMM.dd GGG hh:mm aaa&quot;  02001.July.04 AD 12:08 PM  </span><br><span class="line">&quot;EEE, d MMM yyyy HH:mm:ss Z&quot;  Wed, 4 Jul 2001 12:08:56 -0700  </span><br><span class="line">&quot;yyMMddHHmmssZ&quot;  010704120856-0700  </span><br><span class="line">&quot;yyyy-MM-dd&#39;T&#39;HH:mm:ss.SSSZ&quot;  2001-07-04T12:08:56.235-0700  </span><br><span class="line">&quot;yyyy-MM-dd&#39;T&#39;HH:mm:ss.SSSXXX&quot;  2001-07-04T12:08:56.235-07:00 </span><br><span class="line">&quot;YYYY-&#39;W&#39;ww-u&quot;  2001-W27-3  </span><br><span class="line"></span><br><span class="line"></span><br><span class="line">public static void main(String[] args) &#123;</span><br><span class="line">        Date d &#x3D; new Date();</span><br><span class="line">        SimpleDateFormat s &#x3D; new SimpleDateFormat(&quot;yyyy年MM月dd日 EEE a HH时:mm分:ss秒&quot;);</span><br><span class="line">        System.out.println(s.format(d));</span><br><span class="line">    &#125;</span><br><span class="line">2020年07月19日 星期日 下午 15时:42分:56秒</span><br><span class="line"> </span><br><span class="line"> </span><br><span class="line"> parse 把格式化字符串的时间转换成日期对象Date</span><br></pre></td></tr></table></figure>

<h3 id="日历对象Calendar"><a href="#日历对象Calendar" class="headerlink" title="日历对象Calendar"></a>日历对象Calendar</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">不必new直接使用类</span><br></pre></td></tr></table></figure>

<h3 id="泛型"><a href="#泛型" class="headerlink" title="泛型"></a>泛型</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">泛型就是标签，泛型和集合都只能支持引用数据类型，不支持基本数据类型。</span><br><span class="line">要用基本类型要转换成Inteer</span><br><span class="line"></span><br><span class="line">自定义泛型：</span><br><span class="line">    修饰符  class 类名 &lt;E、T、K、V&gt;定义泛型使用</span><br><span class="line">接口 修饰符 interface 接口名称&lt;泛型变量&gt;&#123;</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">通配符：</span><br><span class="line">？ 使用问号就可以匹配所有泛型</span><br><span class="line">泛型上下限 </span><br><span class="line">？extends Car  只能在Car里这是上限</span><br><span class="line">？super Car 必须是Car的父类。  下限</span><br></pre></td></tr></table></figure>

<h3 id="集合Collection"><a href="#集合Collection" class="headerlink" title="集合Collection"></a>集合Collection</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">集合是大小可变的容器。</span><br><span class="line">数组：类型和长度一旦定义出来就固定了；</span><br><span class="line">经常对元素进行增删改查。集合是非常合适的。</span><br><span class="line">集合特点：</span><br><span class="line">Set 系列集合：添加的元素是无序，不重复，无索引的。</span><br><span class="line"> -- HashSet:添加的元素是无序，不重复，无索引的。</span><br><span class="line"> -- LinkedHashSet 添加的元素是有序，不重复，无索引的。</span><br><span class="line"> -- TreeSet 不重复，无索引的。按照大小默认升序排列！</span><br><span class="line"> List 系列:添加的元素有序，可重复，索引。</span><br><span class="line">  --ArrayList：添加的元素是有序，可重复，有索引的。</span><br><span class="line">  --LinekdList 添加的元素是有序，可重复，有索引的。</span><br></pre></td></tr></table></figure>
